# change this to the event type you want to get the data for
name: dump-payload
on:
  push:
    branches:
      - chore/dump-payload

jobs:
  printJob:
    name: Print event
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: |
          echo "$GITHUB_CONTEXT"
